<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Social Web</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <header class="header">
            <a href="index.html" class="site-title">Social Web</a>
            <nav class="auth-nav" id="auth-nav">
                <a href="chat.html" class="auth-link">Chat</a>
                <a href="login.html" class="auth-link">Đăng nhập</a>
                <a href="register.html" class="auth-link auth-link-primary">Đăng ký</a>
            </nav>
        </header>

        <main class="container">
            <form id="message-form" class="hidden">
                <textarea id="content" placeholder="Nhập tin nhắn..."></textarea>
                <input type="file" id="image" name="image" accept="image/*" />
                <img id="preview" alt="Preview" class="hidden" />
                <button type="submit">Gửi</button>
            </form>

            <ul id="message-list"></ul>
        </main>

        <script src="js/auth.js"></script>
        <script src="js/chat.js"></script>
    </body>
</html>
